<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teazzi · Booking Pemesanan Minuman</title>
    <link rel="stylesheet" href="treat1style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>🧋 Teazzi · Booking Pemesanan</h1>
            <p class="subtitle">Pesan minuman best seller favoritmu!</p>
        </header>

        <!-- FORM PEMESANAN -->
        <form id="formPemesanan">
            <div class="form-group">
                <label for="nama">Nama Pemesan</label>
                <input type="text" id="nama" placeholder="Masukkan nama Anda" required />
            </div>
            <div class="form-group">
                <label for="menu">Menu Best Seller</label>
                <select id="menu" required>
                    <option value="">-- Pilih Menu --</option>
                    <option value="Deep Roast Oolong Milk Tea">☕ Deep Roast Oolong Milk Tea</option>
                    <option value="High Mountain Four Season Oolong Milk Tea">⛰️ High Mountain Four Season Oolong Milk Tea</option>
                    <option value="Jasmine Green Milk Tea">🌿 Jasmine Green Milk Tea</option>
                </select>
            </div>
            <div class="form-group">
                <label for="jumlah">Jumlah (gelas)</label>
                <input type="number" id="jumlah" placeholder="1" min="1" value="1" required />
            </div>
            <div class="form-group">
                <label for="tanggal">Tanggal Pesan</label>
                <input type="date" id="tanggal" required />
            </div>
            <button type="submit" id="btnSubmit">📋 Booking Sekarang</button>
        </form>

        <!-- TABEL RIWAYAT PEMESANAN -->
        <div class="table-wrapper">
            <h2>📄 Riwayat Pemesanan</h2>
            <table id="tabelRiwayat">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama Pemesan</th>
                        <th>Menu</th>
                        <th>Jumlah</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbodyRiwayat">
                    <!-- Data akan ditambahkan oleh JavaScript -->
                </tbody>
            </table>
            <p id="emptyMessage" class="empty-message">Belum ada pesanan. Yuk, pesan sekarang! 🧋</p>
        </div>
    </div>

    <script src="treat1jscript.js"></script>
</body>
</html>
